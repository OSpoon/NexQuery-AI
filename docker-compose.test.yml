name: nexquery-ai-test

services:
  postgres:
    image: postgres:alpine
    environment:
      POSTGRES_DB: nexquery_test
      POSTGRES_USER: adonis
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adonis -d nexquery_test"]
      interval: 5s
      timeout: 5s
      retries: 5
